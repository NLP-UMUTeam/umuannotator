ontology:
  path: resources/pizza.owl
  language: es

annotators:
  - name: ontology
    color: "#ffd6d6"

  - name: temporal
    layer: temporal
    color: "#d6e4ff"

  - name: duckling
    layer: cantidades
    color: "#d6fff6"
    dimensions:
      - number
      - quantity
      - amount-of-money

  - name: regex
    layer: pedido
    source: resources/pizza_regex.yml
    color: "#ffe0b2"


resolver:
  enabled: true
  strategy: longest_match

metrics:

  tfidf:
    enabled: true
    layer: ontology

  extended_tfidf:
    enabled: true
    layer: ontology

    # ancestors | all
    direction: ancestors

    # profundidad máxima en la ontología
    max_distance: 5

    decay:
      # exponential | inverse | none
      type: exponential

      # λ
      value: 0.5