name: pizza_order_patterns
language: es

defaults:
  layer: pedido
  type: order_attribute
  match: regex
  case_sensitive: false
  word_boundaries: false
  priority: 0

patterns:
  - id: size_small
    label: SIZE_SMALL
    pattern: '\b(pequeña|pequeño|individual)\b'
    metadata:
      category: size

  - id: size_large
    label: SIZE_LARGE
    pattern: '\b(grande|familiar|tamaño familiar)\b'
    priority: 5
    metadata:
      category: size

  - id: crust_thin
    label: CRUST_THIN
    pattern: '\b(masa fina|base fina)\b'
    metadata:
      category: crust

  - id: crust_thick
    label: CRUST_THICK
    pattern: '\b(masa gruesa|borde relleno)\b'
    metadata:
      category: crust

  - id: cooking_well_done
    label: COOKING_WELL_DONE
    pattern: '\b(muy hecha|bien hecha|tostada)\b'
    metadata:
      category: cooking

  - id: extra_cheese
    label: EXTRA_CHEESE
    pattern: '\b(extra de queso|doble queso|mucho queso)\b'
    metadata:
      category: modifier

  - id: no_pineapple
    label: NO_PINEAPPLE
    pattern: '\b(sin piña|no quiero piña|sin ananá)\b'
    metadata:
      category: restriction