name: news_es_patterns
language: es

defaults:
  layer: pattern
  type: pattern
  match: phrase
  case_sensitive: false
  word_boundaries: true
  priority: 0

patterns:
  - id: email
    label: EMAIL
    match: regex
    pattern: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b'
    layer: contact
    type: entity
    subtype: email
    priority: 50
    metadata:
      category: contact

  - id: url
    label: URL
    match: regex
    pattern: '\bhttps?://[^\s<>"'']+'
    layer: contact
    type: entity
    subtype: url
    priority: 45
    metadata:
      category: contact

  - id: hashtag
    label: HASHTAG
    match: regex
    pattern: '(?<!\w)#[\wáéíóúÁÉÍÓÚñÑüÜ]+'
    layer: social
    type: entity
    subtype: hashtag
    priority: 30
    metadata:
      category: social

  - id: mention
    label: MENTION
    match: regex
    pattern: '(?<!\w)@[\wáéíóúÁÉÍÓÚñÑüÜ]+'
    layer: social
    type: entity
    subtype: mention
    priority: 30
    metadata:
      category: social

  - id: country_spain
    label: COUNTRY
    match: phrase
    patterns:
      - España
      - Reino de España
      - Estado español
    layer: entity
    type: entity
    subtype: country
    priority: 40
    metadata:
      category: geopolitical
      iso2: ES
      iso3: ESP
      wikidata: Q29

